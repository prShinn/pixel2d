<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <title>Pixel Game 2D</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>⚔ Pixel World</h1>
    <div id="topbar">
        <span id="ui-hp">❤ 100/100</span>
        <span id="ui-wave">🌊 Wave 1</span>
        <span id="ui-kill">☠ Kills: 0</span>
        <span id="ui-wpn">✊ Tay không</span>
    </div>
    <canvas id="gameCanvas" width="640" height="420"></canvas>
    <div id="hint">WASD / ←↑↓→ Di chuyển &nbsp;|&nbsp; J / Space Tấn công &nbsp;|&nbsp; 1-5 Đổi vũ khí &nbsp;|&nbsp; R
        Restart</div>

    <div id="dpad">
        <button id="btn-u">▲</button>
        <button id="btn-l">◄</button>
        <button id="btn-d">▼</button>
        <button id="btn-r">►</button>
    </div>
    <div id="bottomrow">
        <button id="atk-btn">⚔ ATTACK</button>
        <div id="wpn-btns">
            <button class="active" data-wpn="fist">✊</button>
            <button data-wpn="sword">⚔</button>
            <button data-wpn="bow">🏹</button>
            <button data-wpn="staff">🪄</button>
            <button data-wpn="wand">⭐</button>
        </div>
    </div>

    <!-- ===== HỮU ÍCH: hướng dẫn dùng ảnh của bạn ===== -->
    <!--
    ĐỂ DÙNG HÌNH ẢNH RIÊNG (thay stickman):
    1. Thêm thẻ: <img id="playerImg" src="nhan-vat.png" hidden>
    2. Trong phần "Tải asset" bên dưới, bỏ comment dòng:
         playerSprite = document.getElementById('playerImg')
    3. Trong hàm drawPlayer(), thay đoạn vẽ stickman bằng:
         ctx.drawImage(playerSprite, p.x - 16, p.y - 16, 32, 32)
    Lưu ý: ảnh nên là PNG trong suốt, kích thước 32x32 hoặc 64x64
  -->
    <script src="js/map.js"></script>
    <script src="js/player.js"></script>
    <script src="js/monster.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
